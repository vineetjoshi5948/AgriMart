<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/icons/icon.ico" type="image/png">
    <title>Login & Register | AgriMart India</title>
    <style>
        :root {
            --primary: #e6a73a;
            --primary-dark: #c98e2b;
            --bg-overlay: rgba(0, 0, 0, 0.5); /* Added missing variable */
            --text-dark: #333;
            --text-muted: #666;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body {
            /* Updated background logic to ensure it displays correctly */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('assets/images/backimag.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area h1 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: 0.3s;
            font-size: 1rem;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .form-container { display: none; text-align: left; }
        .form-container.active { 
            display: block; 
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .input-group { margin-bottom: 18px; }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus { 
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(230, 167, 58, 0.1);
        }

        .role-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-option {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .role-option.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .submit-btn:hover { 
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-area">
            <h1>AgriMart</h1>
            <p>India's Digital Supply Chain Hub</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchAuth('login')">Login</button>
            <button class="tab-btn" id="regTab" onclick="switchAuth('register')">Register</button>
        </div>

        <div id="loginSection" class="form-container active">
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input id="loginEmail" type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input id="loginPassword" type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">LOGIN</button>
            </form>
        </div>

        <div id="regSection" class="form-container">
            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input id="regName" type="text" placeholder="e.g. Rahul Sharma" required>
                </div>

                <label style="font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 8px;">I am a:</label>
                <div class="role-wrapper">
                    <div class="role-option active" id="optFarmer" onclick="setRole('farmer')">Farmer</div>
                    <div class="role-option" id="optRetailer" onclick="setRole('retailer')">Retailer</div>
                </div>
                <input type="hidden" name="role" id="userRole" value="farmer">

                <div class="input-group">
                    <label>Email Address</label>
                    <input id="regEmail" type="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input id="regPassword" type="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
            </form>
        </div>

        <div class="footer-links">
            <p><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <script>
        function switchAuth(type) {
            const loginSection = document.getElementById('loginSection');
            const regSection = document.getElementById('regSection');
            const loginTab = document.getElementById('loginTab');
            const regTab = document.getElementById('regTab');

            if (type === 'login') {
                loginSection.classList.add('active');
                regSection.classList.remove('active');
                loginTab.classList.add('active');
                regTab.classList.remove('active');
            } else {
                regSection.classList.add('active');
                loginSection.classList.remove('active');
                regTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        }

        function setRole(role) {
            const fBtn = document.getElementById('optFarmer');
            const rBtn = document.getElementById('optRetailer');
            const roleInput = document.getElementById('userRole');
            
            if (role === 'farmer') {
                fBtn.classList.add('active');
                rBtn.classList.remove('active');
                roleInput.value = 'farmer';
            } else {
                rBtn.classList.add('active');
                fBtn.classList.remove('active');
                roleInput.value = 'retailer';
            }
        }

        const API_BASE_URL = 'http://localhost:5000/api';
        const AUTH_STORAGE_KEY = 'agriAuthToken';

        function saveAuth(token, user) {
            localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify({ token, user }));
        }

        async function authRequest(path, options = {}) {
            const response = await fetch(`${API_BASE_URL}${path}`, {
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {}),
                },
                ...options,
                body: options.body && typeof options.body !== 'string' ? JSON.stringify(options.body) : options.body,
            });
            return response;
        }

        async function submitLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const btn = event.target.querySelector('button[type="submit"]');

            if (!email || !password) {
                return showMsg('loginMsg', 'Please enter email and password.', 'error');
            }

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            try {
                const response = await authRequest('/auth/login', {
                    method: 'POST',
                    body: { email, password },
                });

                if (!response.ok) {
                    const payload = await response.json().catch(() => ({}));
                    showMsg('loginMsg', payload.message || 'Login failed. Check credentials.', 'error');
                    return;
                }

                const payload = await response.json();
                saveAuth(payload.token, { _id: payload._id, name: payload.name, email: payload.email, role: payload.role });
                btn.textContent = 'Redirecting...';
                if (payload.role === 'retailer') {
                    location.href = 'pages/retailer/marketplace.html';
                } else {
                    location.href = 'pages/farmer.html/farmerindex.html';
                }
            } finally {
                btn.disabled = false;
                if (btn.textContent === 'Logging in...') btn.textContent = 'LOGIN';
            }
        }

        async function submitRegister(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const role = document.getElementById('userRole').value;
            const btn = event.target.querySelector('button[type="submit"]');

            if (!name || !email || !password) {
                return showMsg('regMsg', 'Please fill all registration fields.', 'error');
            }
            if (password.length < 6) {
                return showMsg('regMsg', 'Password must be at least 6 characters.', 'error');
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            try {
                const response = await authRequest('/auth/register', {
                    method: 'POST',
                    body: { name, email, password, role },
                });

                if (!response.ok) {
                    const payload = await response.json().catch(() => ({}));
                    showMsg('regMsg', payload.message || 'Registration failed.', 'error');
                    return;
                }

                const payload = await response.json();
                saveAuth(payload.token, { _id: payload._id, name: payload.name, email: payload.email, role: payload.role });
                btn.textContent = 'Redirecting...';
                if (payload.role === 'retailer') {
                    location.href = 'pages/retailer/marketplace.html';
                } else {
                    location.href = 'pages/farmer.html/farmerindex.html';
                }
            } finally {
                btn.disabled = false;
                if (btn.textContent === 'Creating account...') btn.textContent = 'CREATE ACCOUNT';
            }
        }

        function showMsg(id, msg, type) {
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.style.cssText = 'margin-top:10px;padding:10px 14px;border-radius:6px;font-size:0.9rem;font-weight:600;';
            }
            el.textContent = msg;
            el.style.background = type === 'error' ? '#fee2e2' : '#dcfce7';
            el.style.color = type === 'error' ? '#dc2626' : '#16a34a';
            const form = id === 'loginMsg' ? document.getElementById('loginForm') : document.getElementById('registerForm');
            if (form && !document.getElementById(id)) form.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        document.getElementById('loginForm')?.addEventListener('submit', submitLogin);
        document.getElementById('registerForm')?.addEventListener('submit', submitRegister);
    </script>
</body>
</html>
