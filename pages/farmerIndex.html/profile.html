<!-- Farmer details/settings -->

<!-- Profile Page -->
<div class="page" id="page-profile">
  <div class="page-header">
    <div>
      <h1>My Profile</h1>
      <ul class="breadcrumb">
        <li><a href="#">AgriMart</a></li><li><i class='bx bx-chevron-right'></i></li>
        <li><a class="active" href="#">Profile</a></li>
      </ul>
    </div>
    <button class="btn-primary"><i class='bx bx-edit'></i> Edit Profile</button>
  </div>

  <div class="profile-hero">
    <div class="profile-avatar">R</div>
    <div>
      <div class="profile-name">Rajan Patel</div>
      <div class="profile-meta">🌾 Wheat & Grain Farmer · Madhya Pradesh, India</div>
      <div class="profile-badges">
        <span class="profile-badge"><i class='bx bxs-check-shield'></i> Verified Farmer</span>
        <span class="profile-badge"><i class='bx bxs-star'></i> 4.8 Rating</span>
        <span class="profile-badge"><i class='bx bxs-package'></i> 1,024 Orders</span>
      </div>
    </div>
  </div>

  <div class="grid-equal">
    <div class="card">
      <div class="card-head"><h3>Personal Information</h3></div>
      <div class="card-body">
        <div class="form-group"><label>Full Name</label><input class="form-control" value="Rajan Patel"></div>
        <div class="form-group"><label>Email</label><input class="form-control" value="rajan.patel@email.com"></div>
        <div class="form-group"><label>Phone</label><input class="form-control" value="+91 98765 43210"></div>
        <div class="form-group"><label>Location</label><input class="form-control" value="Bhopal, Madhya Pradesh"></div>
        <div class="form-actions">
          <button class="btn-primary">Save Changes</button>
          <button class="btn-primary btn-outline">Cancel</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Farm Details</h3></div>
      <div class="card-body">
        <div class="form-group"><label>Farm Name</label><input class="form-control" value="Patel Organic Farm"></div>
        <div class="form-group"><label>Farm Size</label><input class="form-control" value="120 acres"></div>
        <div class="form-group"><label>Primary Crops</label><input class="form-control" value="Wheat, Rice, Corn"></div>
        <div class="form-group"><label>Certification</label><input class="form-control" value="Organic Certified (2024)"></div>
        <div class="form-actions">
          <button class="btn-primary">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
</div>
