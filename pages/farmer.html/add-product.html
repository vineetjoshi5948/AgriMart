<!-- Add new crops/products -->
<!--In farmerIndex.html folder we have to add link tags to each sub child file to add css styling -->
<link rel="stylesheet" href="/css/farmer.css">
<div class="modal-overlay" id="addProductModal">
  <div class="modal">
    <div class="modal-head">
      <h3>Add New Product</h3>
      <i class='bx bx-x modal-close' onclick="document.getElementById('addProductModal').classList.remove('open')"></i>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Product Name</label><input class="form-control" placeholder="e.g. Premium Wheat"></div>
        <div class="form-group"><label>Category</label>
          <select class="form-control"><option>Grains</option><option>Vegetables</option><option>Fruits</option><option>Dairy</option></select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>Price per kg (₹)</label><input class="form-control" type="number" placeholder="64"></div>
        <div class="form-group"><label>Available Stock (kg)</label><input class="form-control" type="number" placeholder="500"></div>
      </div>
      <div class="form-group"><label>Description</label><textarea class="form-control" rows="3" placeholder="Describe your product quality, origin…" style="resize:vertical;"></textarea></div>
      <div class="form-group"><label>Harvest Date</label><input class="form-control" type="date"></div>
      <div class="form-actions">
        <button class="btn-primary" onclick="document.getElementById('addProductModal').classList.remove('open')">Add Product</button>
        <button class="btn-primary btn-outline" onclick="document.getElementById('addProductModal').classList.remove('open')">Cancel</button>
      </div>
    </div>
  </div>
</div>
