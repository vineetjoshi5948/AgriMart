<!-- Browse farmer products -->


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace | AgriRetail</title>
  <link rel="stylesheet" href="../../css/retailer.css">
  <script src="../../js/shell.js"></script>
</head>
<body data-page="marketplace">
  <script>
    document.body.insertAdjacentHTML("afterbegin", dashboardShell("Marketplace", "Buy Products", "Browse fruits and vegetables from verified farmers. Payment is cash only.", `
      <div class="filters">
        <input id="productSearch" type="search" placeholder="Search products">
        <select id="categoryFilter"><option>All</option><option>Fruits</option><option>Vegetables</option><option>Grains</option><option>Dairy</option></select>
        <input id="minPriceFilter" type="number" min="0" placeholder="Min price">
        <input id="maxPriceFilter" type="number" min="0" placeholder="Max price">
        <select id="sortFilter">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
        </select>
      </div>
      <div class="products-grid" id="productsGrid">
        <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
      </div>
      <div class="pagination" id="productPagination">
        <button class="btn ghost" id="prevProducts" type="button">Previous</button>
        <span class="pill" id="productPageInfo">Page 1</span>
        <button class="btn ghost" id="nextProducts" type="button">Next</button>
      </div>
      <section class="panel" style="margin-top:18px;">
        <div class="panel-head"><h2>Sell Products</h2><span class="pill">Retail stock</span></div>
        <form class="form-grid" id="sellForm">
          <div class="field"><label for="sellName">Product name</label><input id="sellName" required><span class="error"></span></div>
          <div class="field"><label for="sellPrice">Price per kg</label><input id="sellPrice" type="number" min="1" required><span class="error"></span></div>
          <div class="field"><label for="sellQuantity">Quantity</label><input id="sellQuantity" required><span class="error"></span></div>
          <div class="field"><label for="sellImage">Image URL</label><input id="sellImage" type="url" placeholder="Optional"><span class="error"></span></div>
          <div class="field full"><button class="btn primary" type="submit">Add Product</button></div>
        </form>
        <div class="listed-products" id="listedProducts" style="margin-top:16px;"></div>
      </section>
    `));
  </script>
  <script src="../../js/app.js"></script> <!--app-->
</body>
</html>
